<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;--surface:#FFFFFF;--surface2:#F0EEE8;--border:#E2DED6;--border2:#CCC9C0;
  --text:#1A1916;--text2:#6B6860;--text3:#9E9B94;
  --accent:#2A5CFF;--accent-bg:#EEF2FF;
  --green:#1A7A4A;--green-bg:#E8F5EE;
  --amber:#92540A;--amber-bg:#FEF3E2;
  --red:#8B1D1D;--red-bg:#FDEAEA;
  --purple:#4B2EA6;--purple-bg:#EEE9FF;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.06);
}
html{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px}
.container{max-width:960px;margin:0 auto;padding:0 20px 80px}

/* Header */
.header{padding:28px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.5px}
.header-left p{font-size:13px;color:var(--text3);margin-top:2px}
.header-stats{display:flex;gap:24px}
.hstat{text-align:right}
.hstat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;line-height:1}
.hstat-label{font-size:11px;color:var(--text3);margin-top:2px}

/* Add panel */
.add-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;box-shadow:var(--shadow)}
.section-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.add-row{display:flex;gap:8px;flex-wrap:wrap}
.add-row input{flex:1;min-width:200px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);transition:border-color .15s}
.add-row input:focus{outline:none;border-color:var(--accent)}
.add-row input::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:1px solid transparent;transition:all .15s;white-space:nowrap;cursor:pointer}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{background:#333}
.btn-primary:disabled{background:#999;border-color:#999;cursor:default}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.fetch-status{font-size:11px;margin-top:8px;min-height:16px;display:flex;align-items:center;gap:6px}
.fetch-status .spinner{width:11px;height:11px;border:1.5px solid var(--border2);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;display:none}
.fetch-status .spinner.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.fetch-ok{color:var(--green)}
.fetch-err{color:var(--red)}
.fetch-info{color:var(--text3)}

/* Search panel */
.search-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;box-shadow:var(--shadow);overflow:hidden}
.search-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:none;border:none;cursor:pointer;color:var(--text);font-size:13px;font-weight:500}
.search-toggle:hover{background:var(--surface2)}
.stl{display:flex;align-items:center;gap:8px;color:var(--text2)}
.sarrow{font-size:11px;color:var(--text3);transition:transform .2s}
.sarrow.open{transform:rotate(180deg)}
.sbody{display:none;padding:16px 18px;border-top:1px solid var(--border)}
.sbody.open{display:block}
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.ptab{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;position:relative;transition:all .15s}
.ptab:hover{background:var(--surface2);border-color:var(--border2)}
.ptab.active{border:2px solid var(--accent);background:var(--accent-bg)}
.ptab.active .ptn{color:var(--accent);font-weight:600}
.ptick{position:absolute;top:4px;right:4px;width:14px;height:14px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center}
.ptab.active .ptick{display:flex}
.ptick svg{width:8px;height:8px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.plogo{width:28px;height:28px;border-radius:6px}
.ptn{font-size:10px;color:var(--text2);text-align:center;line-height:1.3}
.s2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.sfield{display:flex;flex-direction:column;gap:3px}
.sfield label{font-size:11px;color:var(--text3);font-weight:500}
.sfield select{padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text)}
.sdiv{border:none;border-top:1px solid var(--border);margin:12px 0}
.sres{display:flex;flex-direction:column;gap:6px}
.sresrow{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px}
.srname{font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px}
.srbtns{display:flex;gap:6px}
.sbtn{font-size:11px;padding:4px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;color:var(--text2);display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.sbtn:hover{background:var(--surface2);color:var(--text)}
.sbtn.ob{background:var(--accent-bg);color:var(--accent);border-color:#C7D4FF}
.sbtn.cp{background:var(--green-bg);color:var(--green);border-color:#A8D9BC}
.oall{width:100%;margin-top:10px;padding:9px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
.oall:hover{background:var(--border)}
.oall:disabled{opacity:.35;cursor:default}
.semp{text-align:center;padding:14px;color:var(--text3);font-size:12px;border:1px dashed var(--border);border-radius:var(--radius-sm)}
.selc{font-size:11px;color:var(--text3);margin-bottom:10px}
.seli{color:var(--accent);font-weight:600}

/* Controls */
.controls{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filter-btn{font-size:12px;padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;color:var(--text2);transition:all .15s}
.filter-btn:hover{background:var(--surface2)}
.filter-btn.active{background:var(--text);color:#fff;border-color:var(--text);font-weight:500}
.sort-sel{margin-left:auto;font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text)}
.map-link{font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text2);display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.map-link:hover{background:var(--surface2);color:var(--text)}

/* Board */
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.empty-state{text-align:center;padding:48px 16px;color:var(--text3);font-size:13px;grid-column:1/-1}
.empty-icon{font-size:32px;margin-bottom:10px}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--border2)}
.card.new-card{border-color:#A8D9BC;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.ctop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.csrc{font-size:11px;color:var(--text3)}
.badge{font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap}
.b-sp{background:var(--accent-bg);color:var(--accent)}
.b-en{background:var(--purple-bg);color:var(--purple)}
.b-vw{background:var(--amber-bg);color:var(--amber)}
.b-ap{background:var(--green-bg);color:var(--green)}
.b-rj{background:var(--red-bg);color:var(--red)}
.b-wd{background:var(--surface2);color:var(--text2)}
.cadr{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:4px}
.cprc{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.cprc span{font-family:'Inter',sans-serif;font-size:12px;font-weight:400;color:var(--text3)}
.mbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.m-strong{background:var(--green-bg);color:var(--green)}
.m-good{background:var(--accent-bg);color:var(--accent)}
.m-decent{background:var(--amber-bg);color:var(--amber)}
.m-weak{background:var(--red-bg);color:var(--red)}
.m-fail{background:var(--surface2);color:var(--text2)}
.m-none{background:var(--surface2);color:var(--text3)}
.cmeta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.mi{font-size:11px;color:var(--text2)}
.cdesc{font-size:12px;color:var(--text2);line-height:1.55;border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.cview{font-size:11px;color:var(--amber);background:var(--amber-bg);padding:3px 9px;border-radius:20px;margin-top:8px;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.cacts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.cacts button,.cacts a{font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;color:var(--text2);text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.cacts button:hover,.cacts a:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.del-btn{color:var(--red)!important;border-color:#F5C4C4!important}
.del-btn:hover{background:var(--red-bg)!important}

/* Modal */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.moverlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:24px;width:100%;max-width:460px;box-shadow:var(--shadow-md)}
.modal h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:18px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:65px;line-height:1.5}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mdiv{border:none;border-top:1px solid var(--border);margin:14px 0}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.mbtns button{padding:8px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.btn-save{background:var(--text);color:#fff;border-color:var(--text)}
.btn-save:hover{background:#333}
.btn-cancel{background:transparent;color:var(--text2)}
.btn-cancel:hover{background:var(--surface2)}

@media(max-width:600px){
  .header{flex-direction:column;align-items:flex-start}
  .pgrid{grid-template-columns:repeat(3,1fr)}
  .s2col,.f2{grid-template-columns:1fr}
  .board{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">

<header class="header">
  <div class="header-left">
    <h1>Property Tracker</h1>
    <p>St Albans &amp; surrounding · 2–3 bed · up to £2,000/mo</p>
  </div>
  <div class="header-stats" id="hstats"></div>
</header>

<!-- Add panel -->
<div class="add-panel">
  <div class="section-label">Add property</div>
  <div class="add-row">
    <input id="paste-url" placeholder="Paste a Rightmove, Zoopla, OnTheMarket, OpenRent or PrimeLocation URL…" onkeydown="if(event.key==='Enter')doFetch()" />
    <button class="btn btn-primary" id="fetch-btn" onclick="doFetch()">↗ Fetch &amp; score</button>
    <button class="btn btn-ghost" onclick="openManual()">+ Add manually</button>
  </div>
  <div class="fetch-status" id="fetch-status">
    <div class="spinner" id="spinner"></div>
    <span id="status-text" class="fetch-info"></span>
  </div>
</div>

<!-- Search panel -->
<div class="search-panel">
  <button class="search-toggle" onclick="toggleSearch(this)">
    <span class="stl">⊕ Search portals</span>
    <span class="sarrow">▾</span>
  </button>
  <div class="sbody" id="sbody">
    <div class="selc" id="selc">Select one or more portals to search</div>
    <div class="pgrid">
      <div class="ptab" onclick="tp('rightmove',this)"><div class="ptick"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><svg class="plogo" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#00DEB6"/><path d="M8 14L16 8L24 14L24 22L8 22Z" fill="none" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/><rect x="13" y="17" width="6" height="5" fill="#fff"/></svg><div class="ptn">Rightmove</div></div>
      <div class="ptab" onclick="tp('zoopla',this)"><div class="ptick"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><svg class="plogo" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#8E44FF"/><circle cx="16" cy="14" r="5" fill="none" stroke="#fff" stroke-width="2"/><line x1="16" y1="19" x2="16" y2="24" stroke="#fff" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="24" x2="20" y2="24" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg><div class="ptn">Zoopla</div></div>
      <div class="ptab" onclick="tp('otm',this)"><div class="ptick"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><svg class="plogo" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#E8F4FD"/><text x="16" y="19" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="800" fill="#0066CC">OTM</text><rect x="8" y="8" width="6" height="6" rx="1" fill="#0066CC" opacity="0.7"/><rect x="18" y="8" width="6" height="6" rx="1" fill="#0066CC" opacity="0.7"/></svg><div class="ptn">OnTheMarket</div></div>
      <div class="ptab" onclick="tp('openrent',this)"><div class="ptick"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><svg class="plogo" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#1A1A2E"/><path d="M16 8L22 13L22 22L10 22L10 13Z" fill="none" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/><rect x="13.5" y="16" width="5" height="6" rx="0.5" fill="#fff"/><path d="M8 14L16 8L24 14" fill="none" stroke="#4FC3F7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><div class="ptn">OpenRent</div></div>
      <div class="ptab" onclick="tp('primelocation',this)"><div class="ptick"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><svg class="plogo" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#003366"/><text x="16" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="800" fill="#FFD700">PRIME</text><text x="16" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="800" fill="#fff">LOCATION</text></svg><div class="ptn">PrimeLocation</div></div>
    </div>
    <div class="s2col">
      <div class="sfield"><label>Location</label><select id="sloc" onchange="bsu()"><option value="st-albans">St Albans</option><option value="watford">Watford</option><option value="bushey">Bushey</option><option value="radlett">Radlett</option><option value="borehamwood">Borehamwood</option><option value="hatfield">Hatfield</option><option value="barnet">Barnet</option><option value="mill-hill">Mill Hill</option><option value="kings-langley">Kings Langley</option><option value="park-street">Park Street</option><option value="welwyn-garden-city">Welwyn Garden City</option><option value="london-colney">London Colney</option></select></div>
      <div class="sfield"><label>Radius</label><select id="srad" onchange="bsu()"><option value="0.25">0.25 miles</option><option value="0.5">0.5 miles</option><option value="1" selected>1 mile</option><option value="2">2 miles</option><option value="3">3 miles</option><option value="5">5 miles</option><option value="10">10 miles</option></select></div>
    </div>
    <div class="s2col">
      <div class="sfield"><label>Min beds</label><select id="sminb" onchange="bsu()"><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option></select></div>
      <div class="sfield"><label>Max beds</label><select id="smaxb" onchange="bsu()"><option value="">Any</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></div>
    </div>
    <div class="s2col">
      <div class="sfield"><label>Min price</label><select id="sminp" onchange="bsu()"><option value="1000">£1,000</option><option value="1250">£1,250</option><option value="1400" selected>£1,400</option><option value="1500">£1,500</option><option value="1750">£1,750</option></select></div>
      <div class="sfield"><label>Max price</label><select id="smaxp" onchange="bsu()"><option value="1500">£1,500</option><option value="1750">£1,750</option><option value="2000" selected>£2,000</option><option value="2500">£2,500</option><option value="3000">£3,000</option></select></div>
    </div>
    <div class="sfield" style="margin-bottom:12px"><label>Property type</label><select id="stype" onchange="bsu()"><option value="any">Any</option><option value="house">House</option><option value="flat">Flat</option></select></div>
    <hr class="sdiv">
    <div class="sres" id="sres"><div class="semp">Select portals above to generate search links</div></div>
    <button class="oall" id="oall" onclick="openAll()" disabled>Open all selected in new tabs</button>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="filter-btn active" onclick="sf(this,'all')">All</button>
  <button class="filter-btn" onclick="sf(this,'Spotted')">Spotted</button>
  <button class="filter-btn" onclick="sf(this,'Enquired')">Enquired</button>
  <button class="filter-btn" onclick="sf(this,'Viewing booked')">Viewing booked</button>
  <button class="filter-btn" onclick="sf(this,'Applied')">Applied</button>
  <button class="filter-btn" onclick="sf(this,'Rejected')">Rejected</button>
  <a class="map-link" id="map-all" href="#" target="_blank" rel="noopener">📍 Map all</a>
  <select class="sort-sel" onchange="csort=this.value;rb()">
    <option value="date">Newest first</option>
    <option value="score">Best match first</option>
    <option value="price_asc">Price: low–high</option>
    <option value="price_desc">Price: high–low</option>
  </select>
</div>

<div class="board" id="board"></div>
</div>

<!-- Modal -->
<div class="moverlay" id="moverlay">
  <div class="modal">
    <h3 id="mtitle">Add property</h3>
    <div class="field"><label>Address</label><input id="fa" placeholder="e.g. 14 Elm Close, St Albans AL1 2XY" /></div>
    <div class="f2">
      <div class="field" style="margin-bottom:0"><label>Rent (£/mo)</label><input id="fp" type="number" placeholder="1800" /></div>
      <div class="field" style="margin-bottom:0"><label>Status</label><select id="fst"><option>Spotted</option><option>Enquired</option><option>Viewing booked</option><option>Applied</option><option>Rejected</option><option>Withdrawn</option></select></div>
    </div>
    <hr class="mdiv">
    <div class="f2">
      <div class="field" style="margin-bottom:0"><label>Beds</label><select id="fb"><option value="">—</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select></div>
      <div class="field" style="margin-bottom:0"><label>Baths</label><select id="fbt"><option value="">—</option><option value="1">1</option><option value="2">2</option><option value="3">3+</option></select></div>
    </div>
    <div class="f2" style="margin-top:10px">

// ── Scoring ────────────────────────────────────────────────────────────────
function calcScore(p) {
  if (p.parking === 'no') return 0;
  if (p.price > 2000) return 0;
  let pts = 0, max = 95;
  if (p.price <= 1700) pts += 25; else if (p.price <= 1800) pts += 20; else if (p.price <= 1900) pts += 14; else pts += 8;
  if (p.beds === '3' || p.beds === '4') pts += 20; else if (p.beds === '2') pts += 12;
  if (p.type === 'house') pts += 12; else if (p.type === 'flat') pts += 8; else if (p.type === 'maisonette') pts += 5; else pts += 6;
  if (p.baths === '2' || p.baths === '3') pts += 10; else if (p.baths === '1') pts += 5;
  if (p.townwalk === 'under10') pts += 10; else if (p.townwalk === '10to20') pts += 6; else pts += 2;
  if (p.outdoor === 'garden') pts += 10; else if (p.outdoor === 'courtyard') pts += 6;
  if (p.stationwalk === 'under10') pts += 8; else if (p.stationwalk === '10to20') pts += 5; else pts += 2;
  return Math.round((pts / max) * 100);
}

function setStatus(msg, type, loading) {

async function doFetch() {

      body: JSON.stringify({ url })
    });

    if (!res.ok || !json.success) {
      setStatus(json.error || 'Could not fetch listing. Try again.', 'fetch-err', false);
      document.getElementById('fetch-btn').disabled = false;
      return;
    }
    const d = json.data;
    const p = {
      addr: d.address || '',

      beds: String(d.beds || ''),
      baths: String(d.baths || ''),

      outdoor: d.outdoor || '',
      townwalk: d.townwalk || '',
      stationwalk: d.stationwalk || '',
      photos: d.photos_url || '',
      floorplan: d.floorplan_url || '',
      desc: d.description || '',
      score: (d.score !== undefined && d.score !== null) ? parseInt(d.score) : null,
      source: detectSource(url),
      url: url,
      status: 'Spotted',
      notes: '',
      viewing: '',
      date: Date.now()
    };
    if (p.score === null) p.score = calcScore(p);
    props.unshift({ id: nid++, ...p });

    document.getElementById('paste-url').value = '';
    setStatus('Card added ✓', 'fetch-ok', false);
    render();
    flashNew();
    setTimeout(() => setStatus('', 'fetch-info', false), 3000);
  } catch(e) {
    setStatus('Network error — check your connection.', 'fetch-err', false);
  }
  document.getElementById('fetch-btn').disabled = false;
}

function detectSource(url) {
  if (!url) return 'Other';
  if (url.includes('rightmove')) return 'Rightmove';
  if (url.includes('zoopla')) return 'Zoopla';
  if (url.includes('onthemarket')) return 'OnTheMarket';
  if (url.includes('openrent')) return 'OpenRent';
  if (url.includes('primelocation')) return 'PrimeLocation';
  return 'Other';
}

function matchBadge(p) {
  if (p.score === null || p.score === undefined) return `<span class="mbadge m-none">Unscored</span>`;
  if (p.score === 0) return `<span class="mbadge m-fail">✕ Fail — does not meet criteria</span>`;

  if (p.score >= 70) return `<span class="mbadge m-good">✓ ${p.score}% — good match</span>`;
  if (p.score >= 55) return `<span class="mbadge m-decent">– ${p.score}% — decent</span>`;

  if(p==='zoopla'){const z=ZP[loc];if(!z)return null;let u=`https://www.zoopla.co.uk/to-rent/map/property/${z.slug}/?beds_min=${minB}`;if(maxB)u+=`&beds_max=${maxB}`;u+=`&is_retirement_home=false&is_shared_accommodation=false&is_student_accommodation=false&price_frequency=per_month&price_max=${maxP}&price_min=${minP}&q=${z.q}&radius=${r}&search_source=to-rent`;return u;}
  if(p==='otm'){const s=OTM[loc]||loc;let u=`https://www.onthemarket.com/to-rent/property/${s}/?min-bedrooms=${minB}`;if(maxB)u+=`&max-bedrooms=${maxB}`;u+=`&min-price=${minP}&max-price=${maxP}`;if(t==='house')u+=`&prop-types=detached&prop-types=semi-detached&prop-types=terraced&prop-types=bungalows`;if(t==='flat')u+=`&prop-types=flats-apartments`;u+=`&radius=${parseFloat(r).toFixed(2)}&view=map-list`;return u;}
  if(p==='openrent'){const o=OR[loc];if(!o)return null;const ts=t==='house'?'/houses':t==='flat'?'/flats':'';let u=`https://www.openrent.co.uk/properties-to-rent/${o.slug}${ts}?term=${o.term}&area=${Math.round(parseFloat(r))}&prices_min=${minP}&prices_max=${maxP}&bedrooms_min=${minB}`;if(maxB)u+=`&bedrooms_max=${maxB}`;u+=`&acceptNonStudents=true&isLive=true`;return u;}
  if(p==='primelocation'){const pl=PL[loc];if(!pl)return null;const ts=t==='house'?'houses':t==='flat'?'flats':'property';let u=`https://www.primelocation.com/to-rent/${ts}/${pl.slug}/?beds_min=${minB}`;if(maxB)u+=`&beds_max=${maxB}`;u+=`&price_frequency=per_month&price_min=${minP}&price_max=${maxP}`;if(t==='house')u+=`&property_sub_type=detached&property_sub_type=semi_detached&property_sub_type=terraced&property_sub_type=bungalow`;u+=`&q=${pl.q}&radius=${r}&results_sort=highest_price&search_source=to-rent`;return u;}
  return null;
}
function tp(p,el){if(sp.has(p)){sp.delete(p);el.classList.remove('active');}else{sp.add(p);el.classList.add('active');}const n=sp.size;document.getElementById('selc').innerHTML=n===0?'Select one or more portals to search':`<span class="seli">${n} portal${n>1?'s':''} selected</span>`;bsu();}
function bsu(){bu={};sp.forEach(p=>{const u=genUrl(p);if(u)bu[p]=u;});rsr();}
function rsr(){const a=document.getElementById('sres');document.getElementById('oall').disabled=Object.keys(bu).length===0;if(sp.size===0){a.innerHTML='<div class="semp">Select portals above to generate search links</div>';return;}a.innerHTML=PO.filter(p=>sp.has(p)).map(p=>{const url=bu[p];return`<div class="sresrow"><span class="srname">✓ ${PN[p]}</span><div class="srbtns"><button class="sbtn" onclick="cpUrl('${p}',this)" ${!url?'disabled':''}>Copy</button><button class="sbtn ob" onclick="opUrl('${p}')" ${!url?'disabled':''}>↗ Open</button></div></div>`;}).join('');}
function cpUrl(p,btn){const url=bu[p];if(!url)return;navigator.clipboard.writeText(url).then(()=>{btn.classList.add('cp');btn.textContent='✓ Copied';setTimeout(()=>{btn.classList.remove('cp');btn.textContent='Copy';},2000);});}
function opUrl(p){const url=bu[p];if(url)window.open(url,'_blank','noopener');}
function openAll(){PO.forEach(p=>{if(bu[p])window.open(bu[p],'_blank','noopener');});}

render();
</script>
